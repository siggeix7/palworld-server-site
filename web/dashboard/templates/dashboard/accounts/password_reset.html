{% extends "dashboard/accounts/base.html" %}
{% block title %}Recupera password{% endblock %}
{% block content %}
  <p class="eyebrow">Recupero accesso</p><h1>Reimposta la password</h1>
  <p class="auth-copy">Inserisci la tua email. Se l'account esiste, riceverai un collegamento valido per un'ora.</p>
  <form method="post" class="auth-form">{% csrf_token %}{{ form.as_p }}<button type="submit">Invia collegamento</button></form>
{% endblock %}
