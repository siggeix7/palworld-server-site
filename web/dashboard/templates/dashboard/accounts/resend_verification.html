{% extends "dashboard/accounts/base.html" %}
{% block title %}Reinvia conferma{% endblock %}
{% block content %}
  <p class="eyebrow">Verifica email</p>
  <h1>Reinvia il collegamento</h1>
  <p class="auth-copy">Inserisci l'indirizzo usato durante la registrazione.</p>
  <form method="post" class="auth-form">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Invia nuovamente</button>
  </form>
  <div class="auth-links"><a href="{% url 'login' %}">Torna al login</a></div>
{% endblock %}
